name: copilot-skills-agent
description: >
  A skills-powered agent that uses Copilot skill directories.
metadata:
  example:
    - role: user
      content: |-
        My name is Jeff, greet me!
  tags:
    - AI Agent Hosting
    - Skills Agent
    - Copilot SDK
  authors:
    - johmil
template:
  name: copilot-skills-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: v1
  environment_variables:
    - name: AZURE_AI_PROJECT_ENDPOINT
      value: ${AZURE_AI_PROJECT_ENDPOINT}
    - name: GITHUB_TOKEN
      value: ${GITHUB_TOKEN}
