# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml

name: copilot-skills-agent
description: >
  A code-based hosted agent using FoundryCBAgent from the Azure AI AgentServer
  Core SDK. Demonstrates direct control over streaming and non-streaming
  responses with the OpenAI Responses API.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Copilot Skills
    - FoundryCBAgent
    - Code-Based Agent
    - Streaming Responses
template:
  name: copilot-skills-agent
  kind: hosted
  protocols:
    - protocol: responses
  environment_variables:
    - name: AZURE_AI_PROJECT_ENDPOINT
      value: ${AZURE_AI_PROJECT_ENDPOINT}
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{chat}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: chat
